<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PAGINA DO PIRATA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="tudo">
        <center><h2>Cadastro Pirata 🏴‍☠️</h2></center>
        <br>
        
        <div class="parte-de-fora">
            <div class="lado-da-foto">
                <input type="file" id="upload">
                <br>
                <div class="foto">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhQFB0_FnQ9lIwsDK1Ug0SyJRxWfghpw_DZQ&shttps://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhQFB0_FnQ9lIwsDK1Ug0SyJRxWfghpw_DZQ&s" width="150">
                </div>
            </div>

            <br>

            <div class="inputs">
                <div class="linha1">
                    <input type="text" placeholder="Nome do Pirata">
                    <input type="number" placeholder="Recompensa (Berries 💰)">
                </div>
                <br>
                <div class="linha2">
                    <input type="text" placeholder="Tripulação">
                    <select>
                        <option value="">Função</option>
                        <option value="capitao">Capitão</option>
                        <option value="imediato">Imediato</option>
                    </select>
                </div>
                <br>
                <div class="linha3">
                    <select>
                        <option value="">Mar de Origem</option>
                        <option value="east">East Blue</option>
                    </select>
                    <input type="text" placeholder="Fruta do Diabo 🍇">
                </div>
                <br>
                <textarea placeholder="Frase marcante..." rows="3"></textarea>
                <br><br>
                <button class="botao">Gerar Cartaz</button>
            </div>
        </div>
    </div>
    </body>
</html>
